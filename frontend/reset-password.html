<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Uni Attendance — Reset Password</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green:      #00C37A;
      --green-dark: #009F63;
      --green-dim:  rgba(0,195,122,0.1);
      --navy:       #0B1C2C;
      --navy-mid:   #112236;
      --navy-card:  #0F2030;
      --white:      #F4F8FB;
      --muted:      #7A97B0;
      --error:      #FF5C5C;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--navy);
      color: var(--white);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    .card {
      background: var(--navy-mid);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 1rem;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 420px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-bottom: 2rem;
    }

    .brand-dot {
      width: 8px; height: 8px;
      background: var(--green);
      border-radius: 50%;
    }

    .brand h1 {
      font-family: 'Syne', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      color: var(--green);
    }

    h2 {
      font-family: 'Syne', sans-serif;
      font-size: 1.5rem;
      font-weight: 800;
      margin-bottom: 0.4rem;
    }

    .subtitle {
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 1.8rem;
      line-height: 1.5;
    }

    .form-group { margin-bottom: 1.1rem; }

    .form-group label {
      display: block;
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.07em;
      margin-bottom: 0.4rem;
    }

    .input-wrap { position: relative; }

    .input-wrap input {
      width: 100%;
      background: var(--navy);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 0.5rem;
      padding: 0.8rem 1rem;
      color: var(--white);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .input-wrap input:focus {
      border-color: var(--green);
      box-shadow: 0 0 0 3px rgba(0,195,122,0.08);
    }

    .input-wrap input.has-eye { padding-right: 2.5rem; }

    .eye-btn {
      position: absolute; right: 0.8rem; top: 50%;
      transform: translateY(-50%);
      background: none; border: none;
      color: var(--muted); cursor: pointer;
      transition: color 0.18s;
    }

    .eye-btn:hover { color: var(--white); }

    .btn {
      width: 100%;
      padding: 0.85rem;
      background: var(--green);
      color: var(--navy);
      border: none;
      border-radius: 0.5rem;
      font-family: 'Syne', sans-serif;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 0.5rem;
    }

    .btn:hover    { background: var(--green-dark); }
    .btn:disabled { opacity: 0.6; pointer-events: none; }

    .back-link {
      display: block;
      text-align: center;
      margin-top: 1.2rem;
      font-size: 0.84rem;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.18s;
    }

    .back-link:hover { color: var(--white); }

    .alert {
      border-radius: 0.5rem;
      padding: 0.9rem 1rem;
      font-size: 0.85rem;
      margin-bottom: 1.2rem;
      display: none;
    }

    .alert.success {
      background: var(--green-dim);
      border: 1px solid rgba(0,195,122,0.25);
      color: var(--green);
    }

    .alert.error {
      background: rgba(255,92,92,0.1);
      border: 1px solid rgba(255,92,92,0.25);
      color: var(--error);
    }

    /* ── Step panels ── */
    #stepForgot, #stepReset { display: none; }
    #stepForgot.active, #stepReset.active { display: block; }
  </style>
</head>
<body>

  <div class="card">
    <div class="brand">
      <div class="brand-dot"></div>
      <h1>Uni Attendance</h1>
    </div>

    <div id="alertBox" class="alert"></div>

    <!-- ── STEP 1: Enter email ── -->
    <div id="stepForgot" class="active">
      <h2>Forgot Password</h2>
      <p class="subtitle">Enter your account email address and we will send you a link to reset your password.</p>

      <div class="form-group">
        <label>Email Address</label>
        <div class="input-wrap">
          <input type="email" id="emailInput" placeholder="your@email.com"/>
        </div>
      </div>

      <button class="btn" id="sendBtn" onclick="sendResetLink()">Send Reset Link</button>
      <a class="back-link" href="/">← Back to Login</a>
    </div>

    <!-- ── STEP 2: Enter new password (reached via email link) ── -->
    <div id="stepReset">
      <h2>Set New Password</h2>
      <p class="subtitle">Enter your new password below. It must be at least 8 characters.</p>

      <div class="form-group">
        <label>New Password</label>
        <div class="input-wrap">
          <input type="password" id="newPassword" class="has-eye" placeholder="Min. 8 characters"/>
          <button class="eye-btn" type="button" onclick="toggleEye('newPassword')">
            <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>

      <div class="form-group">
        <label>Confirm New Password</label>
        <div class="input-wrap">
          <input type="password" id="confirmPassword" class="has-eye" placeholder="Repeat new password"/>
          <button class="eye-btn" type="button" onclick="toggleEye('confirmPassword')">
            <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>

      <button class="btn" id="resetBtn" onclick="resetPassword()">Reset Password</button>
      <a class="back-link" href="/">← Back to Login</a>
    </div>
  </div>

  <script>
    const BASE_URL = window.location.origin + '/api';

    // ── Check if page was opened via reset link (has ?token= in URL) ──
    const urlParams   = new URLSearchParams(window.location.search);
    const resetToken  = urlParams.get('token');

    if (resetToken) {
      // Show password reset form
      document.getElementById('stepForgot').classList.remove('active');
      document.getElementById('stepReset').classList.add('active');
    }

    // ── Toggle password visibility ──
    function toggleEye(id) {
      const el = document.getElementById(id);
      el.type  = el.type === 'password' ? 'text' : 'password';
    }

    // ── Show alert ──
    function showAlert(type, message) {
      const box     = document.getElementById('alertBox');
      box.className = `alert ${type}`;
      box.textContent = message;
      box.style.display = 'block';
    }

    function hideAlert() {
      document.getElementById('alertBox').style.display = 'none';
    }

    // ── STEP 1: Send reset email ──
    async function sendResetLink() {
      const email = document.getElementById('emailInput').value.trim();
      const btn   = document.getElementById('sendBtn');

      if (!email) {
        showAlert('error', 'Please enter your email address.');
        return;
      }

      hideAlert();
      btn.disabled    = true;
      btn.textContent = 'Sending...';

      try {
        const res  = await fetch(`${BASE_URL}/auth/forgot-password/`, {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ email }),
        });

        const data = await res.json();

        if (res.ok) {
          showAlert('success',
            'Reset link sent! Check your email inbox (and spam folder). The link expires in 30 minutes.'
          );
          document.getElementById('emailInput').value = '';
        } else {
          showAlert('error', data.error || 'Something went wrong. Please try again.');
        }

      } catch (err) {
        showAlert('error', 'Could not reach the server. Check your connection and try again.');
      } finally {
        btn.disabled    = false;
        btn.textContent = 'Send Reset Link';
      }
    }

    // ── STEP 2: Set new password ──
    async function resetPassword() {
      const newPwd     = document.getElementById('newPassword').value;
      const confirmPwd = document.getElementById('confirmPassword').value;
      const btn        = document.getElementById('resetBtn');

      hideAlert();

      if (!newPwd || !confirmPwd) {
        showAlert('error', 'Please fill in both password fields.');
        return;
      }

      if (newPwd.length < 8) {
        showAlert('error', 'Password must be at least 8 characters.');
        return;
      }

      if (newPwd !== confirmPwd) {
        showAlert('error', 'Passwords do not match.');
        return;
      }

      btn.disabled    = true;
      btn.textContent = 'Resetting...';

      try {
        const res  = await fetch(`${BASE_URL}/auth/reset-password/`, {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({
            token:        resetToken,
            new_password: newPwd,
          }),
        });

        const data = await res.json();

        if (res.ok) {
          showAlert('success', 'Password reset successfully! Redirecting to login...');
          document.getElementById('newPassword').value    = '';
          document.getElementById('confirmPassword').value = '';
          // Redirect to login after 2 seconds
          setTimeout(() => { window.location.href = '/'; }, 2000);
        } else {
          showAlert('error', data.error || 'Reset failed. Please request a new link.');
        }

      } catch (err) {
        showAlert('error', 'Could not reach the server. Check your connection and try again.');
      } finally {
        btn.disabled    = false;
        btn.textContent = 'Reset Password';
      }
    }

    // Allow pressing Enter to submit
    document.addEventListener('keydown', e => {
      if (e.key !== 'Enter') return;

      // Stop the browser from executing any default input/form submission actions
      e.preventDefault();
      
      if (resetToken) {
        resetPassword();
      } else {
        sendResetLink();
      }
    });
  </script>
</body>
</html>
